apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: astra-ide
  labels:
    app: astra-backend
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: astra-backend
  template:
    metadata:
      labels:
        app: astra-backend
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      # Grants the backend real node/metrics reads and workspace-pod creation.
      serviceAccountName: astra-backend
      containers:
      - name: api
        image: ghcr.io/prasannamishra001/astra-ide-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom: { secretKeyRef: { name: astra-secrets, key: database-url } }
        - name: JWT_SECRET
          valueFrom: { secretKeyRef: { name: astra-secrets, key: jwt-secret } }
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: COLLAB_WS_URL
          value: "ws://collab:1234"
        # Real-mode flags: read live k8s node metrics and create real workspace pods.
        - name: ASTRA_USE_K8S_METRICS
          value: "1"
        - name: ASTRA_K8S_APPLY
          value: "1"
        - name: SCHEDULER_ALGORITHM
          value: "cp_ppo"
        - name: ASTRA_CLUSTER_ZONE
          value: "IN-NO"
        - name: ASTRA_CLUSTER_LOCATION
          value: "Mumbai, India"
        resources:
          # torch (CPU) + the model raise the footprint over the old 512Mi limit.
          requests: { cpu: "250m", memory: "768Mi" }
          limits:   { cpu: "1500m", memory: "1536Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 8000 }
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /healthz, port: 8000 }
          initialDelaySeconds: 15
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: astra-ide
  labels:
    app: astra-backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port:   "8000"
    prometheus.io/path:   "/metrics"
spec:
  selector: { app: astra-backend }
  ports:
  - port: 8000
    targetPort: 8000
    name: http
