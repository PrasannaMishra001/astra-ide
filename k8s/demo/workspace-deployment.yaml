# Demo workload: a Deployment of lightweight "workspace" pods that Karmada
# propagates across the member clusters. Labelled app: astra-workspace so the
# Tetragon TracingPolicy and the PropagationPolicy select it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: astra-ws
  namespace: astra-ide
  labels:
    app: astra-workspace
spec:
  replicas: 6
  selector:
    matchLabels:
      app: astra-workspace
  template:
    metadata:
      labels:
        app: astra-workspace
    spec:
      # runtimeClassName omitted here so it schedules on any kind node; on a
      # gVisor-enabled node set this to "gvisor" to enforce the sandbox tier.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ide
          image: busybox:1.36
          command: ["sh", "-c", "while true; do cat /etc/hostname; sleep 30; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
